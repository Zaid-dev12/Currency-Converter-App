<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>💱 Currency Converter</h1>

        <form>

            <div class="amount">
                <p>Enter Amount</p>
                <input type="number" value="100" min="1">
            </div>

            <div class="dropdown">

                <div class="from">
                    <p>From</p>

                    <div class="select-container">
                        <img src="https://flagsapi.com/US/flat/64.png" alt="Flag">

                        <select name="from">

                        </select>
                    </div>
                </div>

                <!-- Swap Button -->

                <div class="swap-icon">
                    ⇄
                </div>

                <div class="to">
                    <p>To</p>

                    <div class="select-container">
                        <img src="https://flagsapi.com/IN/flat/64.png" alt="Flag">

                        <select name="to">

                        </select>
                    </div>
                </div>

            </div>

            <div class="msg">
                100 USD = 8,345 INR
            </div>

            <div class="timestamp">
                Last Updated: Just Now
            </div>

            <button type="button">
                Get Exchange Rate
            </button>

        </form>

    </div>

    <script src="code.js"></script>
    <script src="script.js"></script>

</body>
</html>
